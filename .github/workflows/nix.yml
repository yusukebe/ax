name: Nix flake

# The `nix run` step looks redundant next to `nix build`, but it is the only
# step that catches bugs which pass flake check and build yet fail at exec
# time (e.g. `let ... in rec` shadowing). Do NOT drop it.

on:
  push:
    branches: [main]
    paths:
      - '**.nix'
      - 'flake.lock'
      - 'bun.lock'
      - 'package.json'
      - 'src/**'
      - '.github/workflows/nix.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.nix'
      - 'flake.lock'
      - 'bun.lock'
      - 'package.json'
      - 'src/**'
      - '.github/workflows/nix.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nix-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: nix flake check (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # access-tokens keeps GitHub tarball fetches off the anonymous rate limit.
      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035 # v34
        with:
          github_access_token: ${{ github.token }}
          nix_conf: |
            access-tokens = github.com=${{ github.token }}

      - name: nix fmt --ci
        run: nix fmt -- --ci

      - name: nix flake check --all-systems
        run: nix flake check --all-systems --no-build

      - name: nix build .#default
        run: nix build .#default --print-build-logs

      - name: nix run .#default -- --version
        run: nix run .#default -- --version
