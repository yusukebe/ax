name: Nix flake

# Validates the flake (flake.nix). The package builds from source via
# bun2nix, so this fires on changes to the flake files and to anything the
# build consumes (src, lockfiles, nix/bun.nix).
#
# Three steps, in order of what they catch:
#   1. nix flake check --all-systems  — every system's outputs evaluate
#      (including darwin on an ubuntu runner).
#   2. nix build .#default            — the bun2nix dep cache + offline
#      bun install + wrapper actually realise for the runner's system.
#   3. nix run .#default -- --version — the wrapped script actually execs.
#      This is the only step that catches the `let ... in rec` shadowing
#      class of bug (passes flake check, fails nix run). Do NOT drop it.

on:
  push:
    branches: [main]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - '**/*.nix'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig.json'
      - 'src/**'
      - '.github/workflows/nix.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - '**/*.nix'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig.json'
      - 'src/**'
      - '.github/workflows/nix.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nix-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: nix flake check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@e50d5f73bfe71c2dd0aa4218de8f4afa59f8f81d # v16

      - name: nix flake check --all-systems
        run: nix flake check --all-systems --no-build

      - name: nix build .#default
        run: nix build .#default --print-build-logs

      - name: nix run .#default -- --version
        run: nix run .#default -- --version
