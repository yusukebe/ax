name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write # dispatch nix.yml to validate the flake bump

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Tag must match the version in the source
        run: |
          v=$(grep -o "const VERSION = '[^']*'" src/index.ts | cut -d"'" -f2)
          if [ "v$v" != "$GITHUB_REF_NAME" ]; then
            echo "src/index.ts VERSION is $v but tag is $GITHUB_REF_NAME" >&2
            exit 1
          fi

      - name: Build binaries for all targets
        run: |
          mkdir -p dist
          for t in darwin-arm64 darwin-x64 linux-x64 linux-arm64 windows-x64; do
            out="dist/ax-$t"
            [ "$t" = "windows-x64" ] && out="$out.exe"
            bun build src/index.ts --compile --target="bun-$t" --outfile "$out"
          done
          ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 ax-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update Homebrew tap
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          if [ -z "$TAP_DEPLOY_KEY" ]; then echo "TAP_DEPLOY_KEY not set, skipping"; exit 0; fi
          mkdir -p ~/.ssh
          printf '%s\n' "$TAP_DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o StrictHostKeyChecking=accept-new"
          git clone --depth 1 git@github.com:yusukebe/homebrew-tap.git tap
          sh scripts/formula.sh "${GITHUB_REF_NAME#v}" dist/checksums.txt > tap/Formula/ax.rb
          cd tap
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Formula/ax.rb
          git commit -m "ax ${GITHUB_REF_NAME#v}"
          git push

      - name: Update Nix flake
        run: |
          bun scripts/flake-update.ts "${GITHUB_REF_NAME#v}" dist/checksums.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add flake.nix
          git commit -m "chore(nix): bump flake to ${GITHUB_REF_NAME}"
          # The tag points at main's tip, so this fast-forwards main by one
          # commit. If main moved between tag and here, fail loudly rather
          # than force anything — rerun the step after a rebase.
          git push origin HEAD:main

      - name: Validate the bumped flake
        # The bump commit was made with GITHUB_TOKEN and cannot trigger push
        # workflows; an explicit dispatch can.
        run: gh workflow run nix.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
